<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-labelledby="title desc">
  <title id="title">GitHub metrics overview placeholder</title>
  <desc id="desc">This placeholder will be replaced by GitHub Actions after the metrics workflow runs.</desc>
  <rect x="0.5" y="0.5" width="494" height="194" rx="4.5" fill="#151515" stroke="#e4e2e2"/>
  <text x="247.5" y="76" fill="#ffffff" font-family="Segoe UI, Ubuntu, sans-serif" font-size="24" font-weight="700" text-anchor="middle">GitHub Metrics</text>
  <text x="247.5" y="108" fill="#9f9f9f" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" text-anchor="middle">This card will be generated automatically</text>
  <text x="247.5" y="132" fill="#9f9f9f" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" text-anchor="middle">after the first workflow run.</text>
  <text x="247.5" y="160" fill="#79ff97" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12" text-anchor="middle">Add the METRICS_TOKEN repository secret to enable private metrics.</text>
