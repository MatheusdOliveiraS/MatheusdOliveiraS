name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    if: ${{ github.repository == 'MatheusdOliveiraS/MatheusdOliveiraS' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      METRICS_RENDER_TOKEN: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
    steps:
      - name: Notice about private metrics token
        if: ${{ env.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is not configured. Generating public metrics with github.token only."

      - name: Generate overview metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-base.svg
          token: ${{ env.METRICS_RENDER_TOKEN }}
          user: MatheusdOliveiraS
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: Matheus Souza, Matheus de Oliveira Souza, MatheusdOliveiraS, 47464558+MatheusdOliveiraS@users.noreply.github.com, 47464558+MatheusZed@users.noreply.github.com, matheus.souza.gft@youse.com.br

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-languages.svg
          token: ${{ env.METRICS_RENDER_TOKEN }}
          user: MatheusdOliveiraS
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-calendar.svg
          token: ${{ env.METRICS_RENDER_TOKEN }}
          user: MatheusdOliveiraS
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          repositories_affiliations: owner, collaborator, organization_member
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
